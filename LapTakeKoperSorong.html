<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selesai!</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .container { text-align: center; padding: 20px; border-radius: 15px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Animasi Loader */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2ecc71;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        /* Animasi Centang */
        .checkmark {
            display: none;
            color: #2ecc71;
            font-size: 60px;
            margin: 20px auto;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .btn-close {
            display: none;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #e74c3c; /* Warna merah untuk tutup */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-close:hover { background-color: #c0392b; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader" class="loader"></div>
        <div id="checkmark" class="checkmark">✔</div>
        
        <h2 id="main-text">Memproses PDF...</h2>
        <p id="sub-text">Mohon tunggu sebentar.</p>
        
        <button onclick="tutupTab()" id="btnClose" class="btn-close">Tutup Halaman Ini</button>
    </div>

    <script>
        const targetURL = "https://docs.google.com/spreadsheets/d/1AvxFidOmxyDrsPZMGvyfo9BgdhhJ-js0zvwRwcvYIU4/export?format=pdf&gid=1449342186&size=8.3x13&portrait=true&fitw=TRUE&gridlines=false&printtitle=false&sheetnames=false&pagenum=CENTER&fzr=true&attachment=true&r1=0&c1=0&r2=240&c2=11&top_margin=0.2&bottom_margin=0.75&left_margin=0.25&right_margin=0.25&horizontal_alignment=CENTER&vertical_alignment=TOP";
        
        const loader = document.getElementById('loader');
        const checkmark = document.getElementById('checkmark');
        const mainText = document.getElementById('main-text');
        const subText = document.getElementById('sub-text');
        const btnClose = document.getElementById('btnClose');

        // 1. Eksekusi Download
        setTimeout(() => {
            window.location.href = targetURL;
        }, 1500);

        // 2. Tampilkan UI Selesai
        setTimeout(() => {
            loader.style.display = 'none';
            checkmark.style.display = 'block';
            
            mainText.innerText = "Selesai!";
            subText.innerText = "Terima kasih, dokumen Anda sudah diunduh.";
            
            btnClose.style.display = 'inline-block';
        }, 4000);

        // 3. Fungsi Tutup Tab
        function tutupTab() {
            window.close();
            // Fallback jika window.close() diblokir browser:
            alert("Terima kasih! Silakan tutup tab ini secara manual jika tidak tertutup otomatis.");
        }
    </script>

</body>
</html>
